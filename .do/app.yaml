name: vpdn-marketplace
region: nyc
features:
  - buildpack-stack=ubuntu-22

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  - name: vpdn-backend
    github:
      repo: oscarsao/vpdn-marketplace
      branch: main
      deploy_on_push: true
    source_dir: /coyag-backend
    dockerfile_path: coyag-backend/Dockerfile.appplatform
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /api/v1/health
    envs:
      - key: APP_NAME
        value: "COYAG"
      - key: APP_ENV
        value: "production"
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: "${vpdn-mysql.APP_KEY}"
        type: SECRET
      - key: DB_CONNECTION
        value: "mysql"
      - key: DB_HOST
        value: "${vpdn-mysql.HOSTNAME}"
      - key: DB_PORT
        value: "${vpdn-mysql.PORT}"
      - key: DB_DATABASE
        value: "${vpdn-mysql.DATABASE}"
      - key: DB_USERNAME
        value: "${vpdn-mysql.USERNAME}"
      - key: DB_PASSWORD
        value: "${vpdn-mysql.PASSWORD}"
      - key: DATABASE_CA_CERT
        value: "${vpdn-mysql.CA_CERT}"
        type: SECRET
      - key: LOG_CHANNEL
        value: "stderr"
      - key: CACHE_DRIVER
        value: "file"
      - key: SESSION_DRIVER
        value: "file"
      - key: QUEUE_CONNECTION
        value: "sync"

  - name: vpdn-frontend
    github:
      repo: oscarsao/vpdn-marketplace
      branch: main
      deploy_on_push: true
    source_dir: /coyag-frontend
    build_command: npm install && npm run build
    environment_slug: node-js
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    run_command: npx serve -s dist -l 8080
    envs:
      - key: VITE_API_URL
        value: "${APP_URL}/api/v1/"
      - key: VITE_APP_NAME
        value: "COYAG VPDN"
      - key: VITE_USE_MOCK
        value: "false"

databases:
  - name: vpdn-mysql
    engine: MYSQL
    version: "8"
    production: false
    cluster_name: vpdn-mysql
    db_name: coyag
    db_user: doadmin
